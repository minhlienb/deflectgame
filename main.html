<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Platformer Game - WebGL</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            border: 2px solid #444;
            display: block;
        }
        #gameStatus {
            color: white;
            margin-top: 10px;
            padding: 8px 16px;
            background-color: rgba(0,0,0,0.6);
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div id="gameStatus">Connecting to server...</div>
    <script src="webgl-renderer.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const renderer = new WebGLRenderer(canvas);

        const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socket = new WebSocket(`${wsProtocol}//${location.host}`);
        let playerId = null;
        let otherPlayers = new Map();
        let connectionStatus = 'connecting';

        socket.onopen = () => {
            connectionStatus = 'connected';
            document.getElementById('gameStatus').textContent = 'Connected to server';
        };
        socket.onclose = () => {
            connectionStatus = 'disconnected';
            document.getElementById('gameStatus').textContent = 'Disconnected from server';
        };
        socket.onerror = () => {
            connectionStatus = 'error';
            document.getElementById('gameStatus').textContent = 'Connection error';
        };

        function sendPlayerState() {
            if (socket.readyState !== WebSocket.OPEN || !player) return;
            socket.send(JSON.stringify({
                type: 'playerState',
                state: {
                    x: player.x, y: player.y,
                    velocityX: player.velocityX, velocityY: player.velocityY,
                    facingRight: player.facingRight,
                    isAttacking: player.isAttacking, isDeflecting: player.isDeflecting,
                    isJumping: player.isJumping, health: player.health,
                    currentAnimation: player.currentAnimation, frameIndex: player.frameIndex
                }
            }));
        }

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'init') {
                playerId = data.playerId;
                document.getElementById('gameStatus').textContent = `You are Player ${playerId}`;
            } else if (data.type === 'playerState') {
                if (!otherPlayers.has(data.playerId)) {
                    otherPlayers.set(data.playerId, new Player(canvas.width / 2, canvas.height / 2));
                }
                const p = otherPlayers.get(data.playerId);
                const s = data.state;
                p.x = s.x; p.y = s.y;
                p.velocityX = s.velocityX; p.velocityY = s.velocityY;
                p.facingRight = s.facingRight;
                p.isAttacking = s.isAttacking; p.isDeflecting = s.isDeflecting;
                p.isJumping = s.isJumping; p.health = s.health;
                p.currentAnimation = s.currentAnimation; p.frameIndex = s.frameIndex;
            } else if (data.type === 'playerDisconnect') {
                otherPlayers.delete(data.playerId);
            }
        };

        setInterval(sendPlayerState, 50);

        const GRAVITY = 0.5;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 5;
        const PLATFORM_HEIGHT = 20;
        const SPRITE_WIDTH = 128;
        const SPRITE_HEIGHT = 128;
        const SPRITE_SCALE = 0.5;

        const ANIMATIONS = {
            idle:   { src: 'assets/Kunoichi/Idle.png', frames: 9,  fps: 10 },
            run:    { src: 'assets/Kunoichi/Run.png',  frames: 8,  fps: 12 },
            jump:   { src: 'assets/Kunoichi/Jump.png', frames: 10, fps: 12 },
            attack: { src: 'assets/Kunoichi/Attack_1.png', frames: 6, fps: 15 },
            hurt:   { src: 'assets/Kunoichi/Hurt.png', frames: 2,  fps: 8 },
            dead:   { src: 'assets/Kunoichi/Dead.png', frames: 5,  fps: 8 }
        };

        const spriteTextures = {};
        async function loadAllSprites() {
            const promises = Object.entries(ANIMATIONS).map(([name, data]) =>
                renderer.loadTexture(data.src).then(info => { spriteTextures[name] = info; })
            );
            await Promise.all(promises);
        }

        class Player {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.width = SPRITE_WIDTH * SPRITE_SCALE;
                this.height = SPRITE_HEIGHT * SPRITE_SCALE;
                this.velocityX = 0; this.velocityY = 0;
                this.isJumping = false; this.isAttacking = false; this.isDeflecting = false;
                this.attackCooldown = 0; this.deflectCooldown = 0;
                this.health = 100; this.maxHealth = 100;
                this.facingRight = true;
                this.currentAnimation = 'idle';
                this.frameIndex = 0; this.frameTimer = 0;
                this.isDead = false; this.isHurt = false;
            }

            update() {
                if (this.isDead) {
                    this.currentAnimation = 'dead';
                    const anim = ANIMATIONS[this.currentAnimation];
                    this.frameTimer++;
                    if (this.frameTimer >= 60 / anim.fps) {
                        this.frameTimer = 0;
                        if (this.frameIndex < anim.frames - 1) this.frameIndex++;
                    }
                    return;
                }

                this.velocityY += GRAVITY;
                this.x += this.velocityX;
                this.y += this.velocityY;

                if (this.y + this.height > canvas.height - PLATFORM_HEIGHT) {
                    this.y = canvas.height - this.height - PLATFORM_HEIGHT;
                    this.velocityY = 0;
                    this.isJumping = false;
                }
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.deflectCooldown > 0) this.deflectCooldown--;

                if (this.velocityX > 0) this.facingRight = true;
                else if (this.velocityX < 0) this.facingRight = false;

                if (this.isHurt) this.currentAnimation = 'hurt';
                else if (this.isAttacking) this.currentAnimation = 'attack';
                else if (this.isJumping) this.currentAnimation = 'jump';
                else if (this.velocityX !== 0) this.currentAnimation = 'run';
                else this.currentAnimation = 'idle';

                const anim = ANIMATIONS[this.currentAnimation];
                this.frameTimer++;
                if (this.frameTimer >= 60 / anim.fps) {
                    this.frameTimer = 0;
                    this.frameIndex = (this.frameIndex + 1) % anim.frames;
                    if (this.frameIndex === 0) {
                        if (this.currentAnimation === 'attack') this.isAttacking = false;
                        if (this.currentAnimation === 'hurt') this.isHurt = false;
                        if (this.currentAnimation === 'dead') this.isDead = true;
                    }
                }
            }

            draw() {
                const tex = spriteTextures[this.currentAnimation];
                if (tex) {
                    const anim = ANIMATIONS[this.currentAnimation];
                    renderer.drawSprite(
                        tex,
                        this.frameIndex * SPRITE_WIDTH, 0,
                        SPRITE_WIDTH, SPRITE_HEIGHT,
                        this.x, this.y,
                        this.width, this.height,
                        !this.facingRight
                    );
                }

                if (this.isDeflecting) {
                    renderer.drawCircle(
                        this.x + this.width / 2, this.y + this.height / 2, 30,
                        0, 1, 0, 1, 3
                    );
                }

                this.drawHealthBar();
            }

            drawHealthBar() {
                const barW = 40, barH = 5;
                const pct = this.health / this.maxHealth;
                renderer.fillRect(this.x, this.y - 10, barW, barH, 0.4, 0.4, 0.4, 1);
                renderer.fillRect(this.x, this.y - 10, barW * pct, barH, 0, 0.8, 0, 1);
            }

            takeDamage(amount) {
                if (this.isDead) return;
                this.health -= amount;
                if (this.health <= 0) {
                    this.health = 0;
                    this.isDead = true;
                    this.currentAnimation = 'dead';
                    this.frameIndex = 0;
                    this.frameTimer = 0;
                } else {
                    this.isHurt = true;
                    this.frameIndex = 0;
                }
            }

            jump() {
                if (!this.isJumping) {
                    this.velocityY = JUMP_FORCE;
                    this.isJumping = true;
                }
            }

            attack() {
                if (this.attackCooldown === 0) {
                    this.isAttacking = true;
                    this.attackCooldown = 20;
                    setTimeout(() => this.isAttacking = false, 200);
                }
            }

            deflect() {
                if (this.deflectCooldown === 0 && !this.isDead) {
                    this.isDeflecting = true;
                    this.deflectCooldown = 30;
                    setTimeout(() => this.isDeflecting = false, 300);
                }
            }
        }

        const player = new Player(canvas.width / 4, canvas.height / 2);
        const keys = {};

        function checkCollision(r1, r2) {
            return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x &&
                   r1.y < r2.y + r2.height && r1.y + r1.height > r2.y;
        }

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') { e.preventDefault(); player.jump(); }
            if (e.key === 'j' || e.key === 'J') player.attack();
            if (e.key === 'k' || e.key === 'K') player.deflect();
        });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        function gameLoop() {
            renderer.begin();

            if (keys['a'] || keys['A']) player.velocityX = -MOVE_SPEED;
            else if (keys['d'] || keys['D']) player.velocityX = MOVE_SPEED;
            else player.velocityX = 0;

            player.update();

            otherPlayers.forEach((other, id) => {
                other.update();

                if (player.isAttacking) {
                    const atkBox = player.facingRight
                        ? { x: player.x + player.width, y: player.y + 20, width: 30, height: 20 }
                        : { x: player.x - 30, y: player.y + 20, width: 30, height: 20 };
                    if (checkCollision(atkBox, other) && !other.isDead) other.takeDamage(25);
                }

                if (other.isAttacking) {
                    const atkBox = other.facingRight
                        ? { x: other.x + other.width, y: other.y + 20, width: 30, height: 20 }
                        : { x: other.x - 30, y: other.y + 20, width: 30, height: 20 };
                    if (checkCollision(atkBox, player) && !player.isDeflecting && !player.isDead) {
                        player.takeDamage(10);
                    }
                }
            });

            renderer.fillRect(0, canvas.height - PLATFORM_HEIGHT, canvas.width, PLATFORM_HEIGHT, 0.53, 0.53, 0.53, 1);

            otherPlayers.forEach(other => other.draw());
            player.draw();

            renderer.end();

            renderer.fillText('Controls: A/D move, Space jump, J attack, K deflect', 10, 30, '16px Arial', '#fff');
            if (playerId) {
                renderer.fillText(`Player ${playerId}`, player.x + player.width / 2, player.y - 15, '14px Arial', '#fff', 'center');
            }
            otherPlayers.forEach((other, id) => {
                renderer.fillText(`Player ${id}`, other.x + other.width / 2, other.y - 15, '14px Arial', '#fff', 'center');
            });
            renderer.fillText(`Status: ${connectionStatus}`, 10, 50, '14px Arial',
                connectionStatus === 'connected' ? '#0f0' : '#f00');

            renderer.fillText(`Draw calls: ${renderer.drawCalls}`, 10, canvas.height - 30, '12px Arial', '#aaa');

            requestAnimationFrame(gameLoop);
        }

        loadAllSprites().then(() => {
            gameLoop();
        });
    </script>
</body>
</html>
