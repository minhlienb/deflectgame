<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Platformer Game - WebGL</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            border: 2px solid #444;
            display: block;
        }
        #gameStatus {
            color: white;
            margin-top: 10px;
            padding: 8px 16px;
            background-color: rgba(0,0,0,0.6);
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div id="gameStatus">Connecting to server...</div>
    <script src="webgl-renderer.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const renderer = new WebGLRenderer(canvas);

        const TICK_RATE = 128;
        const TICK_INTERVAL_MS = 1000 / TICK_RATE;

        const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socket = new WebSocket(`${wsProtocol}//${location.host}`);
        let playerId = null;
        let otherPlayers = new Map();
        let peerConnections = new Map();
        let dataChannels = new Map();
        let connectionStatus = 'connecting';
        let tickCount = 0;
        let lastFpsTime = performance.now();
        let fps = 0;
        let tickrate = 0;
        let lastTickTime = performance.now();
        let p2pMode = 'waiting';

        const ICE_SERVERS = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        function createPeerConnection(peerId) {
            const pc = new RTCPeerConnection(ICE_SERVERS);
            peerConnections.set(peerId, pc);

            const dc = pc.createDataChannel('game', { ordered: false, maxRetransmits: 0 });
            dc.binaryType = 'arraybuffer';
            setupDataChannel(dc, peerId);

            pc.onicecandidate = (event) => {
                if (event.candidate && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({
                        type: 'iceCandidate',
                        targetId: peerId,
                        candidate: event.candidate
                    }));
                }
            };

            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    cleanupPeer(peerId);
                }
            };

            pc.ondatachannel = (event) => {
                setupDataChannel(event.channel, peerId);
            };

            return pc;
        }

        function setupDataChannel(dc, peerId) {
            dc.onopen = () => {
                dataChannels.set(peerId, dc);
                p2pMode = 'connected';
                document.getElementById('gameStatus').textContent =
                    `Player ${playerId} [P2P ${TICK_RATE}Hz]`;
            };
            dc.onclose = () => {
                dataChannels.delete(peerId);
                if (dataChannels.size === 0) p2pMode = 'waiting';
            };
            dc.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleRemoteState(data, peerId);
                } catch (e) {}
            };
        }

        async function createOffer(peerId) {
            const pc = createPeerConnection(peerId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.send(JSON.stringify({
                type: 'offer',
                targetId: peerId,
                offer: pc.localDescription
            }));
        }

        async function handleOffer(data) {
            let pc = peerConnections.get(data.playerId);
            if (!pc) pc = createPeerConnection(data.playerId);
            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.send(JSON.stringify({
                type: 'answer',
                targetId: data.playerId,
                answer: pc.localDescription
            }));
        }

        async function handleAnswer(data) {
            const pc = peerConnections.get(data.playerId);
            if (pc) await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        }

        async function handleIceCandidate(data) {
            const pc = peerConnections.get(data.playerId);
            if (pc && data.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        }

        function cleanupPeer(peerId) {
            const dc = dataChannels.get(peerId);
            if (dc) dc.close();
            dataChannels.delete(peerId);
            const pc = peerConnections.get(peerId);
            if (pc) pc.close();
            peerConnections.delete(peerId);
            if (dataChannels.size === 0) p2pMode = 'waiting';
        }

        socket.onopen = () => {
            connectionStatus = 'connected';
        };
        socket.onclose = () => {
            connectionStatus = 'disconnected';
            p2pMode = 'disconnected';
            document.getElementById('gameStatus').textContent = 'Disconnected from server';
        };
        socket.onerror = () => {
            connectionStatus = 'error';
            p2pMode = 'error';
            document.getElementById('gameStatus').textContent = 'Connection error';
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'init') {
                playerId = data.playerId;
                document.getElementById('gameStatus').textContent =
                    `Player ${playerId} [P2P connecting...]`;
            } else if (data.type === 'existingPeers') {
                data.peers.forEach(peerId => createOffer(peerId));
            } else if (data.type === 'peerJoined') {
                document.getElementById('gameStatus').textContent =
                    `Player ${playerId} [P2P handshake with ${data.playerId}...]`;
            } else if (data.type === 'offer') {
                handleOffer(data);
            } else if (data.type === 'answer') {
                handleAnswer(data);
            } else if (data.type === 'iceCandidate') {
                handleIceCandidate(data);
            } else if (data.type === 'peerDisconnected') {
                cleanupPeer(data.playerId);
                otherPlayers.delete(data.playerId);
            }
        };

        function sendPlayerStateP2P() {
            if (!player || p2pMode !== 'connected') return;
            const state = {
                x: player.x, y: player.y,
                vx: player.velocityX, vy: player.velocityY,
                fr: player.facingRight,
                atk: player.isAttacking, def: player.isDeflecting,
                jmp: player.isJumping, hp: player.health,
                anim: player.currentAnimation, fi: player.frameIndex
            };
            const msg = JSON.stringify(state);
            dataChannels.forEach(dc => {
                if (dc.readyState === 'open') dc.send(msg);
            });
        }

        function handleRemoteState(msg, peerId) {
            if (!otherPlayers.has(peerId)) {
                otherPlayers.set(peerId, new Player(canvas.width / 2, canvas.height / 2));
            }
            const p = otherPlayers.get(peerId);
            if (msg.x !== undefined) p.x = msg.x;
            if (msg.y !== undefined) p.y = msg.y;
            if (msg.vx !== undefined) p.velocityX = msg.vx;
            if (msg.vy !== undefined) p.velocityY = msg.vy;
            if (msg.fr !== undefined) p.facingRight = msg.fr;
            if (msg.atk !== undefined) p.isAttacking = msg.atk;
            if (msg.def !== undefined) p.isDeflecting = msg.def;
            if (msg.jmp !== undefined) p.isJumping = msg.jmp;
            if (msg.hp !== undefined) p.health = msg.hp;
            if (msg.anim !== undefined) p.currentAnimation = msg.anim;
            if (msg.fi !== undefined) p.frameIndex = msg.fi;
        }

        const GRAVITY = 0.5;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 5;
        const PLATFORM_HEIGHT = 20;
        const SPRITE_WIDTH = 128;
        const SPRITE_HEIGHT = 128;
        const SPRITE_SCALE = 0.5;

        const ANIMATIONS = {
            idle:   { src: 'assets/Kunoichi/Idle.png', frames: 9,  fps: 10 },
            run:    { src: 'assets/Kunoichi/Run.png',  frames: 8,  fps: 12 },
            jump:   { src: 'assets/Kunoichi/Jump.png', frames: 10, fps: 12 },
            attack: { src: 'assets/Kunoichi/Attack_1.png', frames: 6, fps: 15 },
            hurt:   { src: 'assets/Kunoichi/Hurt.png', frames: 2,  fps: 8 },
            dead:   { src: 'assets/Kunoichi/Dead.png', frames: 5,  fps: 8 }
        };

        const spriteTextures = {};
        async function loadAllSprites() {
            const promises = Object.entries(ANIMATIONS).map(([name, data]) =>
                renderer.loadTexture(data.src).then(info => { spriteTextures[name] = info; })
            );
            await Promise.all(promises);
        }

        class Player {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.width = SPRITE_WIDTH * SPRITE_SCALE;
                this.height = SPRITE_HEIGHT * SPRITE_SCALE;
                this.velocityX = 0; this.velocityY = 0;
                this.isJumping = false; this.isAttacking = false; this.isDeflecting = false;
                this.attackCooldown = 0; this.deflectCooldown = 0;
                this.health = 100; this.maxHealth = 100;
                this.facingRight = true;
                this.currentAnimation = 'idle';
                this.frameIndex = 0; this.frameTimer = 0;
                this.isDead = false; this.isHurt = false;
            }

            update() {
                if (this.isDead) {
                    this.currentAnimation = 'dead';
                    const anim = ANIMATIONS[this.currentAnimation];
                    this.frameTimer++;
                    if (this.frameTimer >= 60 / anim.fps) {
                        this.frameTimer = 0;
                        if (this.frameIndex < anim.frames - 1) this.frameIndex++;
                    }
                    return;
                }

                this.velocityY += GRAVITY;
                this.x += this.velocityX;
                this.y += this.velocityY;

                if (this.y + this.height > canvas.height - PLATFORM_HEIGHT) {
                    this.y = canvas.height - this.height - PLATFORM_HEIGHT;
                    this.velocityY = 0;
                    this.isJumping = false;
                }
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.deflectCooldown > 0) this.deflectCooldown--;

                if (this.velocityX > 0) this.facingRight = true;
                else if (this.velocityX < 0) this.facingRight = false;

                if (this.isHurt) this.currentAnimation = 'hurt';
                else if (this.isAttacking) this.currentAnimation = 'attack';
                else if (this.isJumping) this.currentAnimation = 'jump';
                else if (this.velocityX !== 0) this.currentAnimation = 'run';
                else this.currentAnimation = 'idle';

                const anim = ANIMATIONS[this.currentAnimation];
                this.frameTimer++;
                if (this.frameTimer >= 60 / anim.fps) {
                    this.frameTimer = 0;
                    this.frameIndex = (this.frameIndex + 1) % anim.frames;
                    if (this.frameIndex === 0) {
                        if (this.currentAnimation === 'attack') this.isAttacking = false;
                        if (this.currentAnimation === 'hurt') this.isHurt = false;
                        if (this.currentAnimation === 'dead') this.isDead = true;
                    }
                }
            }

            draw() {
                const tex = spriteTextures[this.currentAnimation];
                if (tex) {
                    const anim = ANIMATIONS[this.currentAnimation];
                    renderer.drawSprite(
                        tex,
                        this.frameIndex * SPRITE_WIDTH, 0,
                        SPRITE_WIDTH, SPRITE_HEIGHT,
                        this.x, this.y,
                        this.width, this.height,
                        !this.facingRight
                    );
                }

                if (this.isDeflecting) {
                    renderer.drawCircle(
                        this.x + this.width / 2, this.y + this.height / 2, 30,
                        0, 1, 0, 1, 3
                    );
                }

                this.drawHealthBar();
            }

            drawHealthBar() {
                const barW = 40, barH = 5;
                const pct = this.health / this.maxHealth;
                renderer.fillRect(this.x, this.y - 10, barW, barH, 0.4, 0.4, 0.4, 1);
                renderer.fillRect(this.x, this.y - 10, barW * pct, barH, 0, 0.8, 0, 1);
            }

            takeDamage(amount) {
                if (this.isDead) return;
                this.health -= amount;
                if (this.health <= 0) {
                    this.health = 0;
                    this.isDead = true;
                    this.currentAnimation = 'dead';
                    this.frameIndex = 0;
                    this.frameTimer = 0;
                } else {
                    this.isHurt = true;
                    this.frameIndex = 0;
                }
            }

            jump() {
                if (!this.isJumping) {
                    this.velocityY = JUMP_FORCE;
                    this.isJumping = true;
                }
            }

            attack() {
                if (this.attackCooldown === 0) {
                    this.isAttacking = true;
                    this.attackCooldown = 20;
                    setTimeout(() => this.isAttacking = false, 200);
                }
            }

            deflect() {
                if (this.deflectCooldown === 0 && !this.isDead) {
                    this.isDeflecting = true;
                    this.deflectCooldown = 30;
                    setTimeout(() => this.isDeflecting = false, 300);
                }
            }
        }

        const player = new Player(canvas.width / 4, canvas.height / 2);
        const keys = {};

        function checkCollision(r1, r2) {
            return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x &&
                   r1.y < r2.y + r2.height && r1.y + r1.height > r2.y;
        }

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') { e.preventDefault(); player.jump(); }
            if (e.key === 'j' || e.key === 'J') player.attack();
            if (e.key === 'k' || e.key === 'K') player.deflect();
        });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        let tickAccumulator = 0;
        let lastFrameTime = performance.now();

        function gameLoop(now) {
            const frameDelta = now - lastFrameTime;
            lastFrameTime = now;
            tickAccumulator += frameDelta;

            let ticked = false;
            while (tickAccumulator >= TICK_INTERVAL_MS) {
                tick();
                tickAccumulator -= TICK_INTERVAL_MS;
                ticked = true;
                tickCount++;
            }

            const elapsed = now - lastFpsTime;
            if (elapsed >= 1000) {
                fps = Math.round(tickCount * 1000 / elapsed);
                tickrate = Math.round(1000 / (now - lastTickTime + 1));
                tickCount = 0;
                lastFpsTime = now;
            }

            render(now);
            requestAnimationFrame(gameLoop);
        }

        function tick() {
            if (keys['a'] || keys['A']) player.velocityX = -MOVE_SPEED;
            else if (keys['d'] || keys['D']) player.velocityX = MOVE_SPEED;
            else player.velocityX = 0;

            player.update();

            otherPlayers.forEach((other) => {
                other.update();

                if (player.isAttacking) {
                    const atkBox = player.facingRight
                        ? { x: player.x + player.width, y: player.y + 20, width: 30, height: 20 }
                        : { x: player.x - 30, y: player.y + 20, width: 30, height: 20 };
                    if (checkCollision(atkBox, other) && !other.isDead) other.takeDamage(25);
                }

                if (other.isAttacking) {
                    const atkBox = other.facingRight
                        ? { x: other.x + other.width, y: other.y + 20, width: 30, height: 20 }
                        : { x: other.x - 30, y: other.y + 20, width: 30, height: 20 };
                    if (checkCollision(atkBox, player) && !player.isDeflecting && !player.isDead) {
                        player.takeDamage(10);
                    }
                }
            });

            sendPlayerStateP2P();
            lastTickTime = performance.now();
        }

        function render(now) {
            renderer.begin();

            renderer.fillRect(0, canvas.height - PLATFORM_HEIGHT, canvas.width, PLATFORM_HEIGHT, 0.53, 0.53, 0.53, 1);

            otherPlayers.forEach(other => other.draw());
            player.draw();

            renderer.end();

            renderer.fillText('Controls: A/D move, Space jump, J attack, K deflect', 10, 30, '16px Arial', '#fff');
            if (playerId) {
                renderer.fillText(`Player ${playerId}`, player.x + player.width / 2, player.y - 15, '14px Arial', '#fff', 'center');
            }
            otherPlayers.forEach((other, id) => {
                renderer.fillText(`Player ${id}`, other.x + other.width / 2, other.y - 15, '14px Arial', '#fff', 'center');
            });

            const statusColor = connectionStatus === 'connected' ? '#0f0' : '#f00';
            renderer.fillText(`P2P: ${p2pMode} | Tick: ${TICK_RATE}Hz`, 10, 50, '14px Arial', statusColor);
            renderer.fillText(`Peers: ${dataChannels.size} | FPS: ${fps}`, 10, 70, '14px Arial', '#aaa');
            renderer.fillText(`Draw calls: ${renderer.drawCalls}`, 10, canvas.height - 30, '12px Arial', '#aaa');
        }

        loadAllSprites().then(() => {
            requestAnimationFrame(gameLoop);
        });
    </script>
</body>
</html>
